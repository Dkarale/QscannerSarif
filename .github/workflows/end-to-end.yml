name: Sarif complete workflow
on:
  push:
    branches:
      - main

jobs:
  docker:
    permissions: write-all
    runs-on: self-hosted
    steps:
      - name: Docker image pull
        run: sudo docker pull bkimminich/juice-shop:latest

      - name: List docker images
        run: sudo docker images

      - name: Docker inspect
        run: |
          image_sha=$(sudo docker inspect -f '{{.Id}}' bkimminich/juice-shop:latest)
          echo "Image SHA: $image_sha"
          sudo docker history $image_sha

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan images from list
        continue-on-error: true
        env:
          QUALYS_CLIENT_ID: ${{ secrets.QUALYS_CLIENT_ID }}
          QUALYS_CLIENT_SECRET: ${{ secrets.QUALYS_CLIENT_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GIT_COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
          COMMIT_DATETIME: ${{ github.event.head_commit.timestamp }}
        run: |
          IMAGE_LIST_FILE=images.txt
          SARIF_REPORT_DIR=/home/ubuntu/Qscanner-5.0.0/sarif-reports
          SARIF_UPLOAD_DIR=/home/ubuntu/Qscanner-5.0.0/sarif-upload

          # ✅ Clean and recreate upload dir with open permissions
          sudo rm -rf $SARIF_UPLOAD_DIR
          sudo mkdir -p $SARIF_UPLOAD_DIR
          sudo chmod 777 $SARIF_UPLOAD_DIR

          while IFS= read -r image; do

            # ✅ Skip empty lines and comments
            [[ -z "$image" || "$image" == \#* ]] && continue

            echo "==========================================="
            echo "📦 Processing image: $image"
            echo "==========================================="

            # ✅ Skip to next image if pull fails
            if ! sudo docker pull $image; then
              echo "⚠️ Failed to pull $image, skipping..."
              continue
            fi

            image_sha=$(sudo docker inspect -f '{{.Id}}' $image)
            image_sha_plain=$(echo $image_sha | sed 's/sha256://')
            safe_image_name=$(echo $image | sed 's/[/:]/_/g')

            echo "-------------------------------------------"
            echo "🔍 Environment variables for: $image"
            echo "-------------------------------------------"
            echo "QUALYS_CLIENT_ID        : [REDACTED]"
            echo "QUALYS_CLIENT_SECRET    : [REDACTED]"
            echo "DISABLE_SBOM_UPLOAD     : no"
            echo "SHOW_RESPONSE_BODY      : yes"
            echo "GITHUB_REPOSITORY       : $GITHUB_REPOSITORY"
            echo "GITHUB_REF_NAME         : $GITHUB_REF_NAME"
            echo "GITHUB_EVENT_NAME       : $GITHUB_EVENT_NAME"
            echo "GITHUB_SHA              : $GITHUB_SHA"
            echo "GITHUB_TRIGGERING_ACTOR : $GITHUB_TRIGGERING_ACTOR"
            echo "GITHUB_RUN_ID           : $GITHUB_RUN_ID"
            echo "GITHUB_SERVER_URL       : $GITHUB_SERVER_URL"
            echo "GIT_COMMITTER_NAME      : $GIT_COMMITTER_NAME"
            echo "COMMIT_DATETIME         : $COMMIT_DATETIME"
            echo "IMAGE                   : $image"
            echo "IMAGE_SHA               : $image_sha_plain"
            echo "SAFE_IMAGE_NAME         : $safe_image_name"
            echo "SARIF_OUTPUT_DIR        : $SARIF_REPORT_DIR/$safe_image_name"
            echo "-------------------------------------------"

            # ✅ Run QScanner — || true ensures exit code 43 (AUDIT) won't stop the loop
            sudo -E env \
              QUALYS_CLIENT_ID=$QUALYS_CLIENT_ID \
              QUALYS_CLIENT_SECRET=$QUALYS_CLIENT_SECRET \
              DISABLE_SBOM_UPLOAD=no \
              SHOW_RESPONSE_BODY_IN_BACKEND_ERROR=yes \
              GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              GITHUB_REF_NAME=$GITHUB_REF_NAME \
              GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME \
              GITHUB_SHA=$GITHUB_SHA \
              GITHUB_TRIGGERING_ACTOR=$GITHUB_TRIGGERING_ACTOR \
              GITHUB_RUN_ID=$GITHUB_RUN_ID \
              GITHUB_SERVER_URL=$GITHUB_SERVER_URL \
              GIT_COMMITTER_NAME="$GIT_COMMITTER_NAME" \
            /home/ubuntu/Qscanner-5.0.0/qscanner image $image_sha \
              --pod ENG-POD04 \
              --client-id $QUALYS_CLIENT_ID \
              --client-secret $QUALYS_CLIENT_SECRET \
              --report-format sarif \
              -o $SARIF_REPORT_DIR/$safe_image_name \
              --scan-timeout 30m \
              --skip-verify-tls \
              -l debug \
              --scan-types pkg,compliance,secret \
              -m evaluate-policy \
              --storage-driver docker-overlay2 \
              --collect-build-pipeline-metadata=true || true

            echo "-------------------------------------------"
            echo "🔍 Looking for SARIF in : $SARIF_REPORT_DIR/$safe_image_name"
            echo "🔍 Expected filename    : ${image_sha_plain}-Report.sarif.json"
            echo "🔍 Files in output dir  :"
            ls -la $SARIF_REPORT_DIR/$safe_image_name 2>/dev/null || echo "⚠️ Directory does not exist"
            echo "-------------------------------------------"

            sarif_file=$(find $SARIF_REPORT_DIR/$safe_image_name -name "${image_sha_plain}-Report.sarif.json" 2>/dev/null | head -1)

            if [ -n "$sarif_file" ]; then
              echo "✅ SARIF report found: $sarif_file"
              cp "$sarif_file" $SARIF_UPLOAD_DIR/
              chmod 644 $SARIF_UPLOAD_DIR/$(basename $sarif_file)
              echo "✅ Copied to: $SARIF_UPLOAD_DIR/$(basename $sarif_file)"
            else
              echo "⚠️ No SARIF report found for $image"
              echo "🔍 Trying wildcard search..."
              find $SARIF_REPORT_DIR/$safe_image_name -name "*.sarif*" 2>/dev/null || echo "⚠️ No sarif files at all"
            fi

            echo "🗑️  Deleting scanned image: $image"
            sudo docker rmi $image || true

          done < "$IMAGE_LIST_FILE"

          echo "==========================================="
          echo "📊 Final contents of upload directory:"
          echo "==========================================="
          ls -la $SARIF_UPLOAD_DIR

      # ✅ KEY FIX — Copy SARIF files into GITHUB_WORKSPACE before upload
      # Action cannot access paths outside workspace on self-hosted runners
      - name: Collect SARIF files into workspace
        if: always()
        run: |
          SARIF_WORKSPACE_DIR=$GITHUB_WORKSPACE/sarif-upload
          
          # ✅ Clean and create workspace sarif dir
          rm -rf $SARIF_WORKSPACE_DIR
          mkdir -p $SARIF_WORKSPACE_DIR

          echo "==========================================="
          echo "🔍 Copying SARIF files into workspace..."
          echo "GITHUB_WORKSPACE : $GITHUB_WORKSPACE"
          echo "SARIF_WORKSPACE_DIR : $SARIF_WORKSPACE_DIR"
          echo "==========================================="

          # ✅ Find and copy all SARIF files from upload dir into workspace
          find /home/ubuntu/Qscanner-5.0.0/sarif-upload/ -name "*.sarif.json" 2>/dev/null | while read -r f; do
            echo "📄 Copying: $f"
            cp "$f" $SARIF_WORKSPACE_DIR/
            chmod 644 $SARIF_WORKSPACE_DIR/$(basename $f)
          done

          echo "==========================================="
          echo "📊 Files in workspace ready for upload:"
          echo "==========================================="
          ls -la $SARIF_WORKSPACE_DIR 2>/dev/null || echo "⚠️ No files found in workspace dir"

      # ✅ Upload from workspace path — Action can always access this
      - name: Upload SARIF files
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-upload/
          category: qscanner-results
