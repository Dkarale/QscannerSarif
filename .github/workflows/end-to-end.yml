name: Sarif complete workflow
on:
  push:
    branches:
      - main

jobs:
  docker:
    permissions: write-all
    runs-on: self-hosted
    steps:
      - name: Docker image pull
        run: sudo docker pull bkimminich/juice-shop:latest

      - name: List docker images
        run: sudo docker images

      - name: docker inspect
        run: |
          image_sha=$(sudo docker inspect -f '{{.Id}}' bkimminich/juice-shop:latest)
          echo "Image SHA: $image_sha"
          sudo docker history $image_sha

      - name: Image scan through Qscanner
        continue-on-error: true
        env:
          # ✅ FIX 1: Declare token at step level so it persists
          QUALYS_ACCESS_TOKEN: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9..wrQj0JpeEXnWnXLkEqGFJFQn1znY8VQhWk6jbhPlTGhCWERg5Ci5CR9wndbNge1JRq7uwr9i7ASUCJCSzIqBCQ"
          # ✅ FIX 2: Explicitly forward GitHub context vars for pipeline metadata
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          # ✅ FIX 3: Pass actual commit author (not just the trigger actor)
          GIT_COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
        run: |
          image_sha=$(sudo docker inspect -f '{{.Id}}' bkimminich/juice-shop:latest)
          # ✅ FIX 4: Pass all env vars through sudo using env key=value chain
          sudo -E env \
            QUALYS_ACCESS_TOKEN=$QUALYS_ACCESS_TOKEN \
            DISABLE_SBOM_UPLOAD=yes \
            SHOW_RESPONSE_BODY_IN_BACKEND_ERROR=yes \
            GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
            GITHUB_REF_NAME=$GITHUB_REF_NAME \
            GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME \
            GITHUB_SHA=$GITHUB_SHA \
            GITHUB_TRIGGERING_ACTOR=$GITHUB_TRIGGERING_ACTOR \
            GITHUB_RUN_ID=$GITHUB_RUN_ID \
            GITHUB_SERVER_URL=$GITHUB_SERVER_URL \
            GIT_COMMITTER_NAME="$GIT_COMMITTER_NAME" \
          /home/ubuntu/Qscanner-5.0.0/qscanner image $image_sha \
            --pod ENG-POD04 \
            --skip-verify-tls \
            --access-token $QUALYS_ACCESS_TOKEN \
            --cache none \
            -l debug \
            --report-format sarif \
            -o /home/ubuntu/Qscanner-5.0.0/sarif-reports/evaluate-policy \
            -m evaluate-policy \
            --scan-timeout 30m \
            --scan-types pkg,secret

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan images from list
        continue-on-error: true
        env:
          # ✅ Same fix applied to the list scan step
          QUALYS_ACCESS_TOKEN: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9..wrQj0JpeEXnWnXLkEqGFJFQn1znY8VQhWk6jbhPlTGhCWERg5Ci5CR9wndbNge1JRq7uwr9i7ASUCJCSzIqBCQ"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GIT_COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
        run: |
          IMAGE_LIST_FILE=images.txt
          while IFS= read -r image; do
            echo "Pulling & scanning $image"
            sudo docker pull $image
            image_sha=$(sudo docker inspect -f '{{.Id}}' $image)
            safe_image_name=$(echo $image | sed 's/[/:]/_/g')

            sudo -E env \
              QUALYS_ACCESS_TOKEN=$QUALYS_ACCESS_TOKEN \
              DISABLE_SBOM_UPLOAD=no \
              SHOW_RESPONSE_BODY_IN_BACKEND_ERROR=yes \
              GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              GITHUB_REF_NAME=$GITHUB_REF_NAME \
              GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME \
              GITHUB_SHA=$GITHUB_SHA \
              GITHUB_TRIGGERING_ACTOR=$GITHUB_TRIGGERING_ACTOR \
              GITHUB_RUN_ID=$GITHUB_RUN_ID \
              GITHUB_SERVER_URL=$GITHUB_SERVER_URL \
              GIT_COMMITTER_NAME="$GIT_COMMITTER_NAME" \
            /home/ubuntu/Qscanner-5.0.0/qscanner image $image_sha \
              --pod ENG-POD04 \
              --access-token $QUALYS_ACCESS_TOKEN \
              --report-format sarif \
              -o /home/ubuntu/Qscanner-5.0.0/sarif-reports/$safe_image_name \
              --scan-timeout 30m \
              --skip-verify-tls \
              -l debug \
              --scan-types pkg,secret \
              -m evaluate-policy \
              --storage-driver docker-overlay2

            echo "Deleting scanned image: $image"
            sudo docker rmi $image || true
          done < "$IMAGE_LIST_FILE"

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /home/ubuntu/Qscanner-5.0.0/sarif-reports/evaluate-policy/520e3f10057c57a8b3dc0651ab5e9f8601938fc07f7112e397b3b92f4904f2b1-Report.sarif.json
          category: my-analysis-tool
