name: Sarif complete workflow
on:
  push:
    branches:
      - main
jobs:
  docker:
    permissions: write-all
    runs-on: self-hosted
    steps:
      - name: Docker image pull
        run: sudo docker pull bkimminich/juice-shop:latest

      - name: List docker images
        run: sudo docker images

      - name: docker inspect
        run: |
          image_sha=$(sudo docker inspect -f '{{.Id}}' bkimminich/juice-shop:latest)
          echo "Image SHA: $image_sha"
          sudo docker history $image_sha

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan images from list
        continue-on-error: true
        env:
          QUALYS_ACCESS_TOKEN: ${{ secrets.QUALYS_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GIT_COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
        run: |
          IMAGE_LIST_FILE=images.txt
          SARIF_REPORT_DIR=/home/ubuntu/Qscanner-5.0.0/sarif-reports
          SARIF_PATHS=()

          while IFS= read -r image; do
            echo "-------------------------------------------"
            echo "Pulling & scanning: $image"

            # ✅ Skip to next image if pull fails
            if ! sudo docker pull $image; then
              echo "⚠️ Failed to pull $image, skipping..."
              continue
            fi

            image_sha=$(sudo docker inspect -f '{{.Id}}' $image)
            # ✅ Strip sha256: prefix for SARIF filename matching
            image_sha_plain=$(echo $image_sha | sed 's/sha256://')
            safe_image_name=$(echo $image | sed 's/[/:]/_/g')

            echo "Image SHA: $image_sha_plain"

            # ✅ || true ensures exit code 43 (AUDIT) or any failure
            #    doesn't kill the loop
            sudo -E env \
              QUALYS_ACCESS_TOKEN=$QUALYS_ACCESS_TOKEN \
              DISABLE_SBOM_UPLOAD=no \
              SHOW_RESPONSE_BODY_IN_BACKEND_ERROR=yes \
              GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              GITHUB_REF_NAME=$GITHUB_REF_NAME \
              GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME \
              GITHUB_SHA=$GITHUB_SHA \
              GITHUB_TRIGGERING_ACTOR=$GITHUB_TRIGGERING_ACTOR \
              GITHUB_RUN_ID=$GITHUB_RUN_ID \
              GITHUB_SERVER_URL=$GITHUB_SERVER_URL \
              GIT_COMMITTER_NAME="$GIT_COMMITTER_NAME" \
            /home/ubuntu/Qscanner-5.0.0/qscanner image $image_sha \
              --pod ENG-POD04 \
              --access-token $QUALYS_ACCESS_TOKEN \
              --report-format sarif \
              -o $SARIF_REPORT_DIR/$safe_image_name \
              --scan-timeout 30m \
              --skip-verify-tls \
              -l debug \
              --scan-types pkg,secret \
              -m evaluate-policy \
              --storage-driver docker-overlay2 || true  # ✅ exit 43 (AUDIT) won't stop loop

            # ✅ Dynamically find the SARIF file using the image SHA
            sarif_file=$(find $SARIF_REPORT_DIR/$safe_image_name -name "${image_sha_plain}*-Report.sarif.json" 2>/dev/null | head -1)

            if [ -n "$sarif_file" ]; then
              echo "✅ SARIF report found: $sarif_file"
              SARIF_PATHS+=("$sarif_file")
            else
              echo "⚠️ No SARIF report found for $image in $SARIF_REPORT_DIR/$safe_image_name"
            fi

            echo "Deleting scanned image: $image"
            sudo docker rmi $image || true

          done < "$IMAGE_LIST_FILE"

          # ✅ Write all found SARIF paths to a file for the upload step
          echo "-------------------------------------------"
          echo "SARIF reports collected:"
          printf '%s\n' "${SARIF_PATHS[@]}" | tee /home/ubuntu/Qscanner-5.0.0/sarif-reports/sarif_paths.txt

      # ✅ Upload each SARIF file found dynamically
      - name: Upload SARIF files
        run: |
          SARIF_PATHS_FILE=/home/ubuntu/Qscanner-5.0.0/sarif-reports/sarif_paths.txt

          if [ ! -f "$SARIF_PATHS_FILE" ] || [ ! -s "$SARIF_PATHS_FILE" ]; then
            echo "⚠️ No SARIF reports to upload"
            exit 0
          fi

          while IFS= read -r sarif_file; do
            echo "Uploading: $sarif_file"
            gh sarif upload "$sarif_file" \
              --repo ${{ github.repository }} \
              --ref ${{ github.ref }} \
              --commit ${{ github.sha }} || echo "⚠️ Upload failed for $sarif_file, continuing..."
          done < "$SARIF_PATHS_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
