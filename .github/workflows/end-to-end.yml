name: Sarif complete workflow
on:
  push:
    branches:
      - main

jobs:
  docker:
    permissions: write-all
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan images from list
        continue-on-error: true
        env:
          QUALYS_CLIENT_ID: ${{ secrets.QUALYS_CLIENT_ID }}
          QUALYS_CLIENT_SECRET: ${{ secrets.QUALYS_CLIENT_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GIT_COMMITTER_NAME: ${{ github.event.head_commit.author.name }}
          COMMIT_DATETIME: ${{ github.event.head_commit.timestamp }}
        run: |
          IMAGE_LIST_FILE=images.txt
          SARIF_REPORT_DIR=/home/ubuntu/Qscanner-5.0.0/sarif-reports
          SARIF_UPLOAD_DIR=$GITHUB_WORKSPACE/sarif-upload

          rm -rf $SARIF_UPLOAD_DIR
          mkdir -p $SARIF_UPLOAD_DIR
          chmod 755 $SARIF_UPLOAD_DIR

          while IFS= read -r image; do
            [[ -z "$image" || "$image" == \#* ]] && continue

            echo "==========================================="
            echo "📦 Processing image: $image"
            echo "==========================================="

            if ! sudo docker pull $image; then
              echo "⚠️ Failed to pull $image, skipping..."
              continue
            fi

            image_sha=$(sudo docker inspect -f '{{.Id}}' $image)
            image_sha_plain=$(echo $image_sha | sed 's/sha256://')
            safe_image_name=$(echo $image | sed 's/[/:]/_/g')

            sudo -E env \
              QUALYS_CLIENT_ID=$QUALYS_CLIENT_ID \
              QUALYS_CLIENT_SECRET=$QUALYS_CLIENT_SECRET \
              DISABLE_SBOM_UPLOAD=no \
              SHOW_RESPONSE_BODY_IN_BACKEND_ERROR=yes \
              GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              GITHUB_REF_NAME=$GITHUB_REF_NAME \
              GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME \
              GITHUB_SHA=$GITHUB_SHA \
              GITHUB_TRIGGERING_ACTOR=$GITHUB_TRIGGERING_ACTOR \
              GITHUB_RUN_ID=$GITHUB_RUN_ID \
              GITHUB_SERVER_URL=$GITHUB_SERVER_URL \
              GIT_COMMITTER_NAME="$GIT_COMMITTER_NAME" \
            /home/ubuntu/Qscanner-5.0.0/qscanner image $image_sha \
              --pod ENG-POD04 \
              --client-id $QUALYS_CLIENT_ID \
              --client-secret $QUALYS_CLIENT_SECRET \
              --report-format sarif \
              -o $SARIF_REPORT_DIR/$safe_image_name \
              --scan-timeout 30m \
              --skip-verify-tls \
              -l debug \
              --scan-types pkg,secret,compliance \
              -m evaluate-policy \
              --storage-driver docker-overlay2 \
              --collect-build-pipeline-metadata=true || true

            if [ -d "$SARIF_REPORT_DIR/$safe_image_name" ]; then
              find $SARIF_REPORT_DIR/$safe_image_name -type f -name "*.sarif.json" | while read -r sarif_file; do
                echo "✅ Found SARIF: $sarif_file"
                cp "$sarif_file" $SARIF_UPLOAD_DIR/
                chmod 644 $SARIF_UPLOAD_DIR/$(basename $sarif_file)
                echo "✅ Copied to: $SARIF_UPLOAD_DIR/$(basename $sarif_file)"
              done
            fi

            sudo docker rmi $image || true

          done < "$IMAGE_LIST_FILE"

          echo "==========================================="
          echo "📊 Final SARIF files ready for upload:"
          echo "==========================================="
          ls -lah $SARIF_UPLOAD_DIR || echo "⚠️ No files in upload directory"

      - name: Upload SARIF files
        if: always()
        shell: bash
        run: |
          cd $GITHUB_WORKSPACE
          
          SARIF_COUNT=$(find sarif-upload -name "*.sarif.json" 2>/dev/null | wc -l)
          
          if [ "$SARIF_COUNT" -eq 0 ]; then
            echo "⚠️ No SARIF files found to upload"
            exit 0
          fi
          
          echo "📤 Uploading $SARIF_COUNT SARIF file(s)..."
          
          for sarif_file in sarif-upload/*.sarif.json; do
            if [ -f "$sarif_file" ]; then
              echo "📤 Uploading: $(basename $sarif_file)"
              
              # Create JSON payload file
              PAYLOAD_FILE=$(mktemp)
              
              cat > "$PAYLOAD_FILE" <<EOF
{
  "commit_sha": "${{ github.sha }}",
  "ref": "${{ github.ref }}",
  "sarif": "$(cat "$sarif_file" | gzip | base64 -w 0)",
  "checkout_uri": "${{ github.server_url }}/${{ github.repository }}",
  "started_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "tool_name": "QScanner"
}
EOF
              
              curl -L -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/json" \
                "${{ github.api_url }}/repos/${{ github.repository }}/code-scanning/sarifs" \
                --data @"$PAYLOAD_FILE"
              
              rm -f "$PAYLOAD_FILE"
              
              echo "✅ Uploaded: $(basename $sarif_file)"
            fi
          done
          
          echo "✅ All SARIF files uploaded successfully"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
